services:
  postgres:
    image: postgres:16
    container_name: electronics-postgres
    restart: always
    environment:
      POSTGRES_DB: online_electronics_store_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: electronics-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/online_electronics_store_v2
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: super-secret-jwt-key
      JWT_ACCESS_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 604800000
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data: