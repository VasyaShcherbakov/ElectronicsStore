<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Керування Категоріями</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* === RESET === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #d0e7ff;
        }

        main {
            min-height: calc(100vh - 160px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-title {
            margin: 30px auto;
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(90deg, #42a5f5, #1e88e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .page-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        /* === CARD === */
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            margin-bottom: 30px;
        }

        .card h3 {
            margin-bottom: 15px;
        }

        /* === FORM === */
        .card form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .card input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .card button {
            padding: 10px 18px;
            border-radius: 6px;
            border: none;
            background-color: #4a90e2;
            color: white;
            cursor: pointer;
        }

        .card button:hover {
            background-color: #357abd;
        }

        /* === LIST === */
        ul.category-list {
            list-style: none;
        }

        ul.category-list li {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }

        ul.category-list li:last-child {
            border-bottom: none;
        }

        /* === BACK BUTTON === */
.back-button {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 6px;
    background-color: #4a90e2;
    color: white;
    text-decoration: none;
    cursor: pointer;
    transition: 0.2s;
}

.back-button:hover {
    background-color: #357abd;
}

     /* === HEADER === */
.top-header {
    width: 100%;
    background: linear-gradient(90deg, #42a5f5, #1e88e5);
    padding: 20px 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.header-container {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
}

.header-title {
    color: white;
    font-size: 24px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 0;
}

/* === BACK BUTTON === */
.back-button {
    padding: 8px 16px;
    border-radius: 6px;
    background-color: white;
    color: #1e88e5;
    text-decoration: none;
    font-weight: 600;
    transition: 0.2s;
}

.back-button:hover {
    background-color: #e3f2fd;
}

        .back-button {
    display: inline-block;
    padding: 10px 18px;
    background-color: #4f46e5;
    color: #ffffff;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 500;
    font-family: sans-serif;
    transition: all 0.3s ease;
}

.back-button:hover {
    background-color: #4338ca;
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
}
    </style>
</head>

<body>

<header class="top-header">
    <div class="header-container">
        <h2 class="header-title">Керування Категоріями</h2>
        <a th:href="@{/user/home/main}" class="back-button">← Назад</a>
    </div>
</header>

<main>
    <div class="page-container">


        <div class="card">
            <h3>Добавити категорію</h3>

            <form th:action="@{/admin/add}"
                  th:object="${category}"
                  method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>

                <input type="text"
                       th:field="*{name}"
                       placeholder="Назва категорії"
                       required>

                <button type="submit">Добавити</button>
            </form>
        </div>

        <!-- CATEGORY LIST -->
        <div class="card">
            <h3>Список категорій</h3>

            <ul class="category-list">
                <li th:each="cat : ${categories}"
                    th:text="${cat.name}">
                </li>
            </ul>
        </div>
        <ul class="category-list">
            <li th:each="cat : ${categories}"
                style="display: flex; justify-content: space-between; align-items: center;">

                <span th:text="${cat.name}"></span>

                <form th:action="@{/admin/delete/{id}(id=${cat.id})}"
                      method="post"
                      onsubmit="return confirm('Видалити категорію?');">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <button type="submit"
                            style="background:#e53935; color:white; border:none;
                           padding:6px 12px; border-radius:6px; cursor:pointer;">
                        Видалити
                    </button>
                </form>
            </li>
        </ul>
    </div>
</main>

</body>
</html>
