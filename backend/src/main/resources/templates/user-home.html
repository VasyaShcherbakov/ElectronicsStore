<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<head>
    <meta charset="UTF-8">
    <title>Ваш особистий кабінет</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* === RESET === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #d0e7ff;
        }
        main {
            min-height: calc(100vh - 160px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-title {
            margin: 30px auto;
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(90deg, #42a5f5, #1e88e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }


        .page-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* === HEADER === */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .welcome {
            color: #2e7d32;
            font-weight: bold;
            margin-right: 10px;
        }

        .nav-buttons a,
        .nav-buttons button {
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #ffffff;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            color: #000;
        }

        .nav-buttons a:hover,
        .nav-buttons button:hover {
            background-color: #f0f0f0;
        }

        /* === SEARCH === */
        .search-form {
            margin: 20px 0 30px;
            max-width: 500px;
        }

        .search-form input {
            width: 70%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .search-form button {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            background-color: #4a90e2;
            color: white;
            cursor: pointer;
        }

        .search-form button:hover {
            background-color: #357abd;
        }

        /* === TABLE === */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        thead {
            background-color: #f2f2f2;
        }

        th, td {
            padding: 12px;
            text-align: left;
            vertical-align: middle;
            font-size: 14px;
        }

        th {
            font-weight: bold;
        }

        tbody tr:hover {
            background-color: #f9f9f9;
        }

        .product-image {
            width: 120px;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
        }

        .actions a,
        .actions button {
            display: block;
            width: 100%;
            margin-bottom: 6px;
            padding: 6px;
            font-size: 13px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        .btn-details {
            background-color: #eeeeee;
            color: black;
        }

        .btn-details:hover {
            background-color: #dddddd;
        }

        .btn-cart {
            background-color: #2e7d32;
            color: white;
        }

        .btn-cart:hover {
            background-color: #256428;
        }

        /* === ADD PRODUCT === */
        .add-product {
            margin-top: 40px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            max-width: 500px;
        }

        .add-product h3 {
            margin-bottom: 15px;
        }

        .add-product input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .add-product button {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            background-color: #4a90e2;
            color: white;
            cursor: pointer;
        }

        .add-product button:hover {
            background-color: #357abd;
        }

        @media (max-width: 800px) {
            table {
                font-size: 13px;
            }

            .product-image {
                width: 90px;
                height: 80px;
            }
        }
    </style>
</head>

<body>

<div th:replace="fragments/header :: site-header"></div>

<h2 class="page-title">Ваш особистий кабінет</h2>


<main>
<div class="page-container">

        <div sec:authorize="hasAuthority('ADMIN')" style="margin-bottom: 20px;">
            <a href="/admin/categories" class="btn btn-warning">
                ⚙️ Админка - Управление категориями
            </a>
        </div>

    <!-- SEARCH -->
    <form action="/user/home" method="get" class="search-form">
        <input type="text" name="query" placeholder="Поиск товаров" th:value="${query}">
        <button type="submit">Поиск</button>
    </form>

    <!-- ADD PRODUCT -->
    <div class="add-product">
        <h3>Добавить товар</h3>

        <form th:action="@{/user/home/add}"
              th:object="${product}"
              method="post"
              enctype="multipart/form-data">

            <input type="file" name="imageFile" placeholder="Изображение">

            <input type="text" th:field="*{name}" placeholder="Название">
            <input type="text" th:field="*{description}" placeholder="Описание">
            <input type="number" th:field="*{price}" placeholder="Цена">
            <input type="number" th:field="*{quantity}" placeholder="Количество">

            <!-- Новое поле: выбор категории -->
            <select th:field="*{category}" required>
                <option value="" disabled selected>Выберите категорию</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"></option>
            </select>

            <button type="submit">Добавить</button>
        </form>
    </div>

</div>
</main>
</body>
</html>
