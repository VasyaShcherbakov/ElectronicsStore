<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Ваш особистий кабінет</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/user-home.css}">

</head>

<body>

<div th:replace="fragments/header :: site-header"></div>

<h2 class="page-title">Ваш особистий кабінет</h2>


<main>
    <div class="page-container">

        <div sec:authorize="hasAuthority('ADMIN')" style="margin-bottom: 20px;">
            <a href="/admin/categories" class="btn btn-warning">
                ⚙️ Админка - Управление категориями
            </a>
        </div>
        <div class="nav-buttons">
            <a th:href="@{/chats}">💬 Мои сообщения</a>
        </div>
        <!-- SEARCH -->
        <form action="/user/home" method="get" class="search-form">
            <input type="text" name="query" placeholder="Поиск товаров" th:value="${query}">
            <button type="submit">Поиск</button>
        </form>

        <!-- TABLE -->
        <table>
            <caption>Мої товари виставлені на продаж</caption>

            <thead>
            <tr>
                <th>Название</th>
                <th>Описание</th>
                <th>Цена</th>
                <th>Количество</th>
                <th>Изображение</th>
                <th>Дата</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.name}"></td>
                <td class="description" th:text="${product.description}"></td>
                <td th:text="${product.price + ' грн'}"></td>
                <td th:text="${product.quantity}"></td>
                <td>
                    <img th:if="${product.imageUrl != null and not #strings.isEmpty(product.imageUrl)}"
                         th:src="@{'/uploads/' + ${product.imageUrl}}"
                         class="product-image"
                         alt="Изображение">
                </td>
                <td th:text="${#temporals.format(product.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
                <td class="actions">
                    <a th:href="@{/products/{id}(id=${product.id})}" class="btn-details">
                        Детали
                    </a>
                    <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn-cart">
                        ✏️ Редагувати товар
                    </a>

                </td>
            </tr>
            </tbody>
        </table>


        <!-- ADD PRODUCT -->
        <div class="add-product">
            <h3>Добавить товар</h3>

            <form th:action="@{/user/home/add}"
                  th:object="${product}"
                  method="post"
                  enctype="multipart/form-data">

                <input type="file" name="imageFile" placeholder="Изображение">

                <input type="text" th:field="*{name}" placeholder="Название">

                <textarea th:field="*{description}"
                          placeholder="Описание"
                          rows="5"></textarea>

                <input type="number" th:field="*{price}" placeholder="Цена">
                <input type="number" th:field="*{quantity}" placeholder="Количество">

                <!-- Новое поле: выбор категории -->
                <select th:field="*{category}" required>
                    <option value="" disabled selected>Выберите категорию</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"></option>
                </select>

                <button type="submit">Добавить</button>
            </form>
        </div>

    </div>
</main>
</body>
</html>
