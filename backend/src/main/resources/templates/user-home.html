<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Главная страница</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* === RESET === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #d0e7ff;
            min-height: 100vh;
            padding: 20px;
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* === HEADER === */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .welcome {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-buttons a,
        .nav-buttons button {
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #ffffff;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            color: #000;
        }

        .nav-buttons a:hover,
        .nav-buttons button:hover {
            background-color: #f0f0f0;
        }

        /* === SEARCH === */
        .search-form {
            margin: 20px 0 30px;
            max-width: 500px;
        }

        .search-form input {
            width: 70%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .search-form button {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            background-color: #4a90e2;
            color: white;
            cursor: pointer;
        }

        .search-form button:hover {
            background-color: #357abd;
        }

        /* === TABLE === */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        thead {
            background-color: #f2f2f2;
        }

        th, td {
            padding: 12px;
            text-align: left;
            vertical-align: middle;
            font-size: 14px;
        }

        th {
            font-weight: bold;
        }

        tbody tr:hover {
            background-color: #f9f9f9;
        }

        .product-image {
            width: 120px;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
        }

        .actions a,
        .actions button {
            display: block;
            width: 100%;
            margin-bottom: 6px;
            padding: 6px;
            font-size: 13px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        .btn-details {
            background-color: #eeeeee;
            color: black;
        }

        .btn-details:hover {
            background-color: #dddddd;
        }

        .btn-cart {
            background-color: #2e7d32;
            color: white;
        }

        .btn-cart:hover {
            background-color: #256428;
        }

        /* === ADD PRODUCT === */
        .add-product {
            margin-top: 40px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            max-width: 500px;
        }

        .add-product h3 {
            margin-bottom: 15px;
        }

        .add-product input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .add-product button {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            background-color: #4a90e2;
            color: white;
            cursor: pointer;
        }

        .add-product button:hover {
            background-color: #357abd;
        }

        @media (max-width: 800px) {
            table {
                font-size: 13px;
            }

            .product-image {
                width: 90px;
                height: 80px;
            }
        }
    </style>
</head>

<body>

<div class="page-container">

    <!-- HEADER -->
    <div class="top-bar">
        <div class="welcome">
            Добро пожаловать, <span th:text="${user.username}"></span>!
        </div>

        <div class="nav-buttons">
            <a href="/cart">Корзина (<span th:text="${cartSize}"></span>)</a>
            <a href="/products">К покупкам</a>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit">Выход</button>
            </form>
        </div>
    </div>

    <!-- SEARCH -->
    <form action="/user/home" method="get" class="search-form">
        <input type="text" name="query" placeholder="Поиск товаров" th:value="${query}">
        <button type="submit">Поиск</button>
    </form>

    <!-- TABLE -->
    <table>
        <thead>
        <tr>
            <th>Название</th>
            <th>Описание</th>
            <th>Цена</th>
            <th>Количество</th>
            <th>Изображение</th>
            <th>Дата</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.name}"></td>
            <td th:text="${product.description}"></td>
            <td th:text="${product.price + ' грн'}"></td>
            <td th:text="${product.quantity}"></td>
            <td>
                <img th:if="${product.imageUrl != null and not #strings.isEmpty(product.imageUrl)}"
                     th:src="@{'/uploads/' + ${product.imageUrl}}"
                     class="product-image"
                     alt="Изображение">
            </td>
            <td th:text="${#temporals.format(product.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
            <td class="actions">
                <a th:href="@{/products/{id}(id=${product.id})}" class="btn-details">
                    Детали
                </a>
                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn-cart">
                        В корзину
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- ADD PRODUCT -->
    <div class="add-product">
        <h3>Добавить товар</h3>

        <form th:action="@{/user/home/add}"
              th:object="${product}"
              method="post"
              enctype="multipart/form-data">

            <input type="file" name="imageFile">
            <input type="text" th:field="*{name}" placeholder="Название">
            <input type="text" th:field="*{description}" placeholder="Описание">
            <input type="number" th:field="*{price}" placeholder="Цена">
            <input type="number" th:field="*{quantity}" placeholder="Количество">

            <button type="submit">Добавить</button>
        </form>
    </div>

</div>

</body>
</html>
