<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Список товаров</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <!-- Хедер -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <a href="/user/home" class="btn btn-outline-dark me-2" sec:authorize="isAuthenticated()">Мои товары</a>
        </div>

        <div class="d-flex align-items-center">
            <a th:href="@{/login}" class="btn btn-outline-primary me-2" sec:authorize="isAnonymous()">Вход</a>
            <a th:href="@{/register}" class="btn btn-outline-success me-2" sec:authorize="isAnonymous()">Регистрация</a>

            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center me-2">
            <span class="me-2 text-success fw-semibold">
                Рады видеть вас <span sec:authentication="name"></span>!
            </span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-outline-danger">Выход</button>
                </form>
            </div>
        </div>
    </div>


    <h1 class="mb-3">Список товаров</h1>

    <!-- Поиск -->
    <form action="/products/search" method="get" class="mb-4">
        <div class="input-group w-50">
            <input type="text" name="query" placeholder="Поиск товаров"
                   th:value="${query}" class="form-control">
            <button type="submit" class="btn btn-primary">Поиск</button>
        </div>
    </form>

    <!-- Таблица товаров -->
    <div class="row">
        <div class="col-md-4 mb-4" th:each="product : ${products}">
            <div class="card h-100">
                <img th:if="${product.imageUrl != null and not #strings.isEmpty(product.imageUrl)}"
                     th:src="@{'/uploads/' + ${product.imageUrl}}"
                     class="card-img-top" alt="Изображение товара" style="height: 250px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Название товара</h5>
                    <p class="card-text" th:text="${product.description}">Описание товара</p>
                    <p class="card-text"><strong>Цена:</strong> <span th:text="${product.price}">0.00</span> Грн.</p>
                    <p class="card-text"><strong>На складе:</strong> <span th:text="${product.quantity}">0</span></p>
                    <p class="card-text"><strong>Дата:</strong> <span th:text="${#temporals.format(product.createdAt, 'dd.MM.yyyy HH:mm')}"></span></p>
                </div>
                <div class="card-footer d-flex justify-content-between">
                    <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-success btn-sm">Купить</button>
                    </form>
                    <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-sm">Детали</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
