<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Список товаров</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* === RESET === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #d0e7ff;
            min-height: 100vh;
            padding: 20px;
        }

        /* === КОНТЕЙНЕР === */
        .page-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* === ХЕДЕР === */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left a,
        .header-right a,
        .header-right button {
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            color: #000;
        }

        .header-left a:hover,
        .header-right a:hover,
        .header-right button:hover {
            background-color: #f0f0f0;
        }

        .welcome {
            color: #2e7d32;
            font-weight: bold;
            margin-right: 10px;
        }

        /* === ЗАГОЛОВОК === */
        h1 {
            margin-bottom: 20px;
        }

        /* === ПОИСК === */
        .search-form {
            margin-bottom: 30px;
            max-width: 500px;
        }

        .search-form input {
            width: 70%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .search-form button {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            background-color: #4a90e2;
            color: white;
            cursor: pointer;
        }

        .search-form button:hover {
            background-color: #357abd;
        }

        /* === СЕТКА ТОВАРОВ === */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        /* === КАРТОЧКА === */
        .product-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background-color: #f2f2f2;
        }

        .product-body {
            padding: 15px;
            flex-grow: 1;
        }

        .product-body h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .product-body p {
            font-size: 14px;
            margin-bottom: 6px;
        }

        /* === ФУТЕР КАРТОЧКИ === */
        .product-footer {
            padding: 12px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .product-footer button,
        .product-footer a {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }

        .btn-buy {
            background-color: #2e7d32;
            color: white;
        }

        .btn-buy:hover {
            background-color: #256428;
        }

        .btn-details {
            background-color: #eeeeee;
            color: black;
        }

        .btn-details:hover {
            background-color: #dddddd;
        }

        @media (max-width: 600px) {
            .search-form input {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>

<body>

<div class="page-container">

    <!-- ХЕДЕР -->
    <div class="header">

        <div class="header-left">
            <a href="/user/home" sec:authorize="isAuthenticated()">Мои товары</a>
        </div>

        <div class="header-right">
            <a th:href="@{/login}" sec:authorize="isAnonymous()">Вход</a>
            <a th:href="@{/register}" sec:authorize="isAnonymous()">Регистрация</a>

            <span class="welcome" sec:authorize="isAuthenticated()">
                Рады видеть вас, <span sec:authentication="name"></span>!
            </span>

            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit">Выход</button>
            </form>
        </div>

    </div>

    <h1>Список товаров</h1>

    <!-- ПОИСК -->
    <form action="/products/search" method="get" class="search-form">
        <input type="text" name="query" placeholder="Поиск товаров" th:value="${query}">
        <button type="submit">Поиск</button>
    </form>

    <!-- ТОВАРЫ -->
    <div class="products-grid">

        <div class="product-card" th:each="product : ${products}">

            <img th:if="${product.imageUrl != null and not #strings.isEmpty(product.imageUrl)}"
                 th:src="@{'/uploads/' + ${product.imageUrl}}"
                 alt="Изображение товара">

            <div class="product-body">
                <h3 th:text="${product.name}">Название</h3>
                <p th:text="${product.description}">Описание</p>
                <p><strong>Цена:</strong> <span th:text="${product.price}"></span> грн</p>
                <p><strong>На складе:</strong> <span th:text="${product.quantity}"></span></p>
                <p><strong>Дата:</strong>
                    <span th:text="${#temporals.format(product.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                </p>
            </div>

            <div class="product-footer">
                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn-buy">Купить</button>
                </form>

                <a th:href="@{/products/{id}(id=${product.id})}" class="btn-details">
                    Детали
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
