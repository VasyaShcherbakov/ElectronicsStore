<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мої чати</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/list.css}">

</head>

<body>

<div class="page-container">

    <h2>💬 Мої чати </h2>

    <div class="chat-card">

        <div th:if="${chats.isEmpty()}" class="empty">
            Повідомлень поки немає
        </div>

        <div th:each="chat : ${chats}">
            <a class="chat-item"
               th:href="@{/chats/{id}(id=${chat.id})}">

                <div class="chat-left">

                    <div class="avatar"
                         th:text="${
                           chat.buyer.id == currentUser.id
                           ? chat.seller.username.substring(0,1)
                           : chat.buyer.username.substring(0,1)
                         }">
                    </div>

                    <div class="chat-name"
                         th:text="${
                           chat.buyer.id == currentUser.id
                           ? chat.seller.username
                           : chat.buyer.username
                         }">
                    </div>

                </div>

                <div class="arrow">➤</div>

            </a>
        </div>

    </div>

</div>

</body>
</html>
