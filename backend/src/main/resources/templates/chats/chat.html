<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Чат з продавцем</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/chat.css}">

</head>

<body>

<div th:replace="fragments/header :: site-header"></div>

<div class="chat-layout">

<div th:replace="fragments/chat-header :: chat-card-header"></div>

<div class="chat-card">

    <div class="chat-header">
        💬 Чат з продавцем
    </div>

    <div class="chat-messages">
        <div th:each="msg : ${messages}"
             th:class="'message ' + (${msg.sender.id} == ${currentUser.id} ? 'me' : 'other')">

            <div class="author"
                 th:text="${msg.sender.username}">
            </div>

            <div th:text="${msg.text}"></div>
        </div>
    </div>

    <form class="chat-input"
          th:action="@{/chats/{id}/send(id=${chat.id})}"
          method="post">

        <!-- CSRF -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <input type="text"
               name="text"
               placeholder="Введите сообщение..."
               required>

        <button type="submit">➤</button>
    </form>

</div>

</div>

</body>

</html>
