<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Чат с продавцом</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* === RESET === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #d0e7ff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* === CARD === */
        .chat-card {
            background: #fff;
            width: 100%;
            max-width: 500px;
            height: 600px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* === HEADER === */
        .chat-header {
            padding: 15px;
            background-color: #2196f3;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }

        /* === MESSAGES === */
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background-color: #f5f7fa;
        }

        .message {
            margin-bottom: 12px;
            max-width: 75%;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message .author {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 3px;
            opacity: 0.8;
        }

        /* === MESSAGE TYPES === */
        .message.me {
            background-color: #2196f3;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .message.other {
            background-color: #e0e0e0;
            color: #000;
            margin-right: auto;
            border-bottom-left-radius: 2px;
        }

        /* === INPUT === */
        .chat-input {
            padding: 10px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .chat-input button {
            padding: 10px 14px;
            border-radius: 6px;
            border: none;
            background-color: #2196f3;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .chat-input button:hover {
            background-color: #1976d2;
        }
    </style>
</head>

<body>

<div class="chat-card">

    <div class="chat-header">
        💬 Чат с продавцом
    </div>

    <div class="chat-messages">
        <div th:each="msg : ${messages}"
             th:class="'message ' + (${msg.sender.id} == ${currentUser.id} ? 'me' : 'other')">

            <div class="author"
                 th:text="${msg.sender.username}">
            </div>

            <div th:text="${msg.text}"></div>
        </div>
    </div>

    <form class="chat-input"
          th:action="@{/chats/{id}/send(id=${chat.id})}"
          method="post">

        <!-- CSRF -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <input type="text"
               name="text"
               placeholder="Введите сообщение..."
               required>

        <button type="submit">➤</button>
    </form>

</div>

</body>
</html>
