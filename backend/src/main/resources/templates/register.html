<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/register.css}">

</head>

<body>



<div th:replace="fragments/header :: site-header"></div>



<main>
<div class="register-card">

    <h2>Реєстрація</h2>


    <div th:if="${error}" class="global-error">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post">

        <div class="form-group">
            <label>Логин</label>
            <input type="text" th:field="*{username}" required>
            <div th:if="${#fields.hasErrors('username')}"
                 class="error"
                 th:errors="*{username}"></div>
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input type="password" th:field="*{password}" required>
            <div th:if="${#fields.hasErrors('password')}"
                 class="error"
                 th:errors="*{password}"></div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}">
            <div th:if="${#fields.hasErrors('email')}"
                 class="error"
                 th:errors="*{email}"></div>
        </div>

        <div class="form-group">
            <label>Телефон</label>
            <input type="text" th:field="*{phoneNumber}">
            <div th:if="${#fields.hasErrors('phoneNumber')}"
                 class="error"
                 th:errors="*{phoneNumber}"></div>
        </div>

        <div class="form-group">
            <label>Стать</label>
            <select th:field="*{gender}">
                <option value="">— Выберите —</option>
                <option th:value="MALE">Мужской</option>
                <option th:value="FEMALE">Женский</option>
            </select>

            <div th:if="${#fields.hasErrors('gender')}"
                 class="error"
                 th:errors="*{gender}"></div>
        </div>

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <button type="submit">Зареєструватись</button>
    </form>

</div>


</main>
</body>
</html>
