<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Регистрация</title>
</head>
<body class="container mt-4" style="background-color:#d0e7ff;">
<h2>Регистрация</h2>

<!-- Вывод ошибки при регистрации -->
<div th:if="${error}" style="color: red;">
    <p th:text="${error}"></p>
</div>

<form th:action="@{/register}" th:object="${user}" method="post">
    <label>Логин:
        <input type="text" th:field="*{username}" required />
        <div th:if="${#fields.hasErrors('username')}" style="color: red;" th:errors="*{username}"></div>
    </label><br>

    <label>Пароль:
        <input type="password" th:field="*{password}" required />
        <div th:if="${#fields.hasErrors('password')}" style="color: red;" th:errors="*{password}"></div>
    </label><br>
    <label>Email:
        <input type="email" th:field="*{email}" />
        <div th:if="${#fields.hasErrors('email')}" style="color: red;" th:errors="*{email}"></div>
    </label><br>

    <label>Телефон:
        <input type="text" th:field="*{phoneNumber}" />
        <div th:if="${#fields.hasErrors('phoneNumber')}" style="color: red;" th:errors="*{phoneNumber}"></div>
    </label><br>

    <label>Пол:
        <select th:field="*{gender}">
            <option th:value="MALE">Мужской</option>
            <option th:value="FEMALE">Женский</option>
        </select>
        <div th:if="${#fields.hasErrors('gender')}" style="color: red;" th:errors="*{gender}"></div>
    </label><br>


    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <button type="submit">Зарегистрироваться</button>
</form>




</body>
</html>
