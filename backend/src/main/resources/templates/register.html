<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* === RESET === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #d0e7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* === CARD === */
        .register-card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .register-card h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* === FORM === */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4a90e2;
        }

        /* === ERRORS === */
        .error {
            color: red;
            font-size: 13px;
            margin-top: 5px;
        }

        .global-error {
            color: red;
            text-align: center;
            margin-bottom: 15px;
        }

        /* === BUTTON === */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            background-color: #4a90e2;
            color: white;
        }

        button:hover {
            background-color: #357abd;
        }
    </style>
</head>

<body>

<div class="register-card">

    <h2>Регистрация</h2>

    <!-- Глобальная ошибка -->
    <div th:if="${error}" class="global-error">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post">

        <div class="form-group">
            <label>Логин</label>
            <input type="text" th:field="*{username}" required>
            <div th:if="${#fields.hasErrors('username')}"
                 class="error"
                 th:errors="*{username}"></div>
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input type="password" th:field="*{password}" required>
            <div th:if="${#fields.hasErrors('password')}"
                 class="error"
                 th:errors="*{password}"></div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}">
            <div th:if="${#fields.hasErrors('email')}"
                 class="error"
                 th:errors="*{email}"></div>
        </div>

        <div class="form-group">
            <label>Телефон</label>
            <input type="text" th:field="*{phoneNumber}">
            <div th:if="${#fields.hasErrors('phoneNumber')}"
                 class="error"
                 th:errors="*{phoneNumber}"></div>
        </div>

        <div class="form-group">
            <label>Пол</label>
            <select th:field="*{gender}">
                <option value="">— Выберите —</option>
                <option th:value="MALE">Мужской</option>
                <option th:value="FEMALE">Женский</option>
            </select>
            <div th:if="${#fields.hasErrors('gender')}"
                 class="error"
                 th:errors="*{gender}"></div>
        </div>

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <button type="submit">Зарегистрироваться</button>
    </form>

</div>

</body>
</html>
