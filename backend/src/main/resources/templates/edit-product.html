<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать товар</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/edit-product.css}">

</head>

<body>

<div class="edit-card">

    <h1>Редактировать товар</h1>

    <form th:action="@{/products/update}"
          method="post"
          enctype="multipart/form-data">

        <input type="hidden" name="id" th:value="${product.id}">

        <div class="form-group">
            <label>Название</label>
            <input type="text" name="name"
                   th:value="${product.name}" required>
        </div>

        <div class="form-group">
            <label>Описание</label>
            <textarea name="description"
                      required
                      th:text="${product.description}"></textarea>
        </div>

        <div class="form-group">
            <label>Цена</label>
            <input type="number" step="0.01"
                   name="price"
                   th:value="${product.price}" required>
        </div>

        <div class="form-group">
            <label>Количество</label>
            <input type="number"
                   name="quantity"
                   th:value="${product.quantity}" required>
        </div>

        <!-- 🔥 ВАЖНО: загрузка нового файла -->
        <div class="form-group">
            <label>Новое изображение (если нужно заменить)</label>
            <input type="file" name="imageFile">
        </div>

        <!-- 👀 Превью текущей картинки -->
        <div class="image-preview"
             th:if="${product.imageUrl != null}">
            <p>Текущее изображение:</p>
            <img th:src="@{'/uploads/' + ${product.imageUrl}}"
                 alt="Изображение товара">
        </div>

        <div class="buttons">
            <button type="submit">Сохранить</button>
            <button type="button"
                    onclick="history.back()"
                    class="btn-back">
                Назад
            </button>
        </div>
    </form>


</div>

</body>
</html>
