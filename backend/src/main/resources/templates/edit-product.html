<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редагувати товар</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/edit-product.css}">

</head>

<body>

<div th:replace="fragments/header :: site-header"></div>

<div class="edit-card">

    <h1>Редагувати товар</h1>

    <form th:action="@{/products/update}"
          method="post"
          enctype="multipart/form-data">

        <input type="hidden" name="id" th:value="${product.id}">

        <div class="form-group">
            <label>Назва</label>
            <input type="text" name="name"
                   th:value="${product.name}" required>
        </div>

        <div class="form-group">
            <label>Опис</label>
            <textarea name="description"
                      required
                      th:text="${product.description}"></textarea>
        </div>

        <div class="form-group">
            <label>Ціна</label>
            <input type="number" step="0.01"
                   name="price"
                   th:value="${product.price}" required>
        </div>

        <div class="form-group">
            <label>Кількість</label>
            <input type="number"
                   name="quantity"
                   th:value="${product.quantity}" required>
        </div>


        <div class="form-group">
            <label>Нове зображення ( якщо потрібно змітинити )</label>
            <input type="file" name="imageFile">
        </div>


        <div class="image-preview"
             th:if="${product.imageUrl != null}">
            <p>Поточне зображення:</p>
            <img
                    th:if="${product.imageUrl != null and product.imageUrl.startsWith('http')}"
                    th:src="${product.imageUrl}"
                    class="product-image"
                    alt="Зображення"
            />

            <img
                    th:if="${product.imageUrl != null and !product.imageUrl.startsWith('http')}"
                    th:src="@{'/uploads/' + ${product.imageUrl}}"
                    class="product-image"
                    alt="Зображення"
            />

        </div>

        <div class="buttons">
            <button type="submit">Зберегти</button>
            <button type="button"
                    onclick="history.back()"
                    class="btn-back">
                Назад
            </button>
        </div>
    </form>


</div>

</body>
</html>
