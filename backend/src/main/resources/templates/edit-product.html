<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать товар</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* === RESET === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #d0e7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* === CARD === */
        .edit-card {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .edit-card h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* === FORM === */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #4a90e2;
        }

        /* === IMAGE PREVIEW === */
        .image-preview {
            margin-top: 10px;
            text-align: center;
        }

        .image-preview img {
            max-width: 150px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        /* === BUTTONS === */
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            background-color: #4a90e2;
            color: white;
        }

        button:hover {
            background-color: #357abd;
        }

        .btn-back {
            display: inline-block;
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            background-color: #eeeeee;
            color: black;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-back:hover {
            background-color: #dddddd;
        }
    </style>
</head>

<body>

<div class="edit-card">

    <h1>Редактировать товар</h1>

    <form th:action="@{/products/update}" method="post">

        <input type="hidden" name="id" th:value="${product.id}">

        <div class="form-group">
            <label>Название</label>
            <input type="text" name="name" th:value="${product.name}" required>
        </div>

        <div class="form-group">
            <label>Описание</label>
            <textarea name="description" required
                      th:text="${product.description}"></textarea>
        </div>

        <div class="form-group">
            <label>Цена</label>
            <input type="number" step="0.01" name="price"
                   th:value="${product.price}" required>
        </div>

        <div class="form-group">
            <label>Количество</label>
            <input type="number" name="quantity"
                   th:value="${product.quantity}" required>
        </div>

        <div class="form-group">
            <label>URL изображения</label>
            <input type="text" name="imageUrl"
                   th:value="${product.imageUrl}">
        </div>

        <div class="image-preview" th:if="${product.imageUrl != null}">
            <img th:src="@{'/uploads/' + ${product.imageUrl}}"
                 alt="Изображение товара">
        </div>

        <div class="buttons">
            <button type="submit">Сохранить</button>
            <a href="/products" class="btn-back">Назад</a>
        </div>

    </form>

</div>

</body>
</html>
