<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Корзина</title>
</head>
<body class="container mt-4" style="background-color:#d0e7ff;">
<div class="container mt-4">
    <h1>Корзина</h1>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Название</th>
            <th>Описание</th>
            <th>Цена</th>
            <th>Количество</th>
            <th>Удалить</th>
            <th>Сумма</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${cartItems}">
            <td th:text="${item.product.name}"></td>
            <td th:text="${item.product.description}"></td>
            <td th:text="${item.product.price}"></td>
            <td th:text="${item.quantity}"></td>
            <td>
                <form th:action="@{'/cart/remove/' + ${item.id}}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button class="btn btn-danger btn-sm" type="submit">Удалить</button>
                </form>
            </td>
            <td th:text="${item.product.price * item.quantity} + ' Грн.'"></td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <td colspan="5"><strong>Итого:</strong></td>
            <td th:text="${total} + ' Грн.'"></td>
        </tr>
        </tfoot>
    </table>
    <a href="/products" class="btn btn-primary">Вернуться к товарам</a>
</div>
</body>
</html>
