<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Корзина</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* === RESET === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #d0e7ff;
            min-height: 100vh;
            padding: 20px;
        }

        .page-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
        }

        /* === TABLE === */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            margin-bottom: 20px;
        }

        thead {
            background-color: #f2f2f2;
        }

        th, td {
            padding: 12px;
            font-size: 14px;
            text-align: left;
            vertical-align: middle;
        }

        tbody tr:hover {
            background-color: #f9f9f9;
        }

        tfoot td {
            font-weight: bold;
            background-color: #fafafa;
        }

        /* === BUTTONS === */
        .btn-remove {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background-color: #c62828;
            color: white;
            font-size: 13px;
        }

        .btn-remove:hover {
            background-color: #a71d1d;
        }

        .btn-back {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 6px;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-back:hover {
            background-color: #357abd;
        }

        @media (max-width: 700px) {
            th, td {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<div class="page-container">

    <h1>Корзина</h1>

    <table>
        <thead>
        <tr>
            <th>Название</th>
            <th>Описание</th>
            <th>Цена</th>
            <th>Количество</th>
            <th>Удалить</th>
            <th>Сумма</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="item : ${cartItems}">

            <!-- ФОТО -->
            <td>
                <img th:if="${item.product.imageUrl != null}"
                     th:src="@{'/uploads/' + ${item.product.imageUrl}}"
                     alt="Фото"
                     style="
                width: 80px;
                height: 80px;
                object-fit: cover;
                border-radius: 8px;
             ">
            </td>

            <td th:text="${item.product.name}"></td>
            <td th:text="${item.product.description}"></td>
            <td th:text="${item.product.price}"></td>
            <td th:text="${item.quantity}"></td>

            <td>
                <form th:action="@{'/cart/remove/' + ${item.id}}" method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />
                    <button type="submit" class="btn-remove">
                        Удалить
                    </button>
                </form>
            </td>

            <td th:text="${item.product.price * item.quantity} + ' грн'"></td>

        </tr>
        </tbody>


        <tfoot>
        <tr>
            <td colspan="5">Итого:</td>
            <td th:text="${total} + ' грн'"></td>
        </tr>
        </tfoot>
    </table>

    <a href="/products" class="btn-back">Вернуться к товарам</a>

</div>

</body>
</html>
