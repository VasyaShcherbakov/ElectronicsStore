<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вхід</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #d0e7ff;
        }

        /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
        main {
            min-height: calc(100vh - 160px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== КАРТОЧКА ===== */
        .login-card {
            background: #ffffff;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
        }

        /* ===== ФОРМА ===== */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 11px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #4a90e2;
        }

        /* ===== КНОПКИ ===== */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        .btn-login {
            background-color: #4a90e2;
            color: white;
        }

        .btn-login:hover {
            background-color: #357abd;
        }

        .btn-register {
            background-color: #eeeeee;
        }

        .btn-register:hover {
            background-color: #dddddd;
        }

        /* ===== ОШИБКА ===== */
        .error {
            color: red;
            text-align: center;
            margin-bottom: 18px;
        }
    </style>
</head>

<body>


<div th:replace="fragments/header :: site-header"></div>

<main>
    <div class="login-card">
        <h2>Вхід</h2>

        <div th:if="${param.error}" class="error">
            Неправильний логін або пароль
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="username">Ім’я користувача</label>
                <input id="username" type="text" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input id="password" type="password" name="password" required>
            </div>

            <button type="submit" class="btn-login">Увійти</button>
        </form>

        <form th:action="@{/register}" method="get">
            <button type="submit" class="btn-register">Реєстрація</button>
        </form>
    </div>
</main>

</body>
</html>
