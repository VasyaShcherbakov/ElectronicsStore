<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="site-header">
    <div style="
        background: linear-gradient(135deg, #1e88e5, #42a5f5);
        padding: 25px 35px;
        border-bottom-left-radius: 24px;
        border-bottom-right-radius: 24px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        color: white;
    ">
        <div style="
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        ">
            <!-- Ліва частина -->
            <div>
                <h1 style="margin: 0; font-size: 32px; font-weight: 700;">
                    ⚡ ЕлектроМаркет
                </h1>
                <p style="margin: 6px 0 0; font-size: 15px; opacity: 0.95;">
                    Купівля та продаж електроніки від користувачів
                </p>
                <p style="margin: 2px 0 0; font-size: 14px; opacity: 0.85;">
                    Тут ви можете продати свою стару електронну техніку
                    <br>
                    або переглянути товари, які пропонують інші користувачі
                </p>
            </div>

            <!-- Права частина -->
            <nav style="display: flex; align-items: center; gap: 15px;">
                <a href="/products" style="
                    color: white;
                    text-decoration: none;
                    font-weight: 500;
                    padding: 8px 14px;
                    border-radius: 20px;
                    background: rgba(255,255,255,0.15);
                ">
                    🛒 Товари
                </a>


            </nav>
        </div>
    </div>
</header>

</body>
</html>
