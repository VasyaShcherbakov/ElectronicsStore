<!DOCTYPE html>
<html lang="uk"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Чат</title>

    <style>

        header.chat-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        /* чтобы контент не залезал под хедер */
        body {
            margin: 0;
            padding-top: 130px;
        }

        .chat-header-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            border-radius: 8px;
            background-color: white;
            color: #1e88e5;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .chat-header-btn:hover {
            background-color: #f1f1f1;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

<header th:fragment="chat-header" class="chat-header">
    <div style="
        background: linear-gradient(135deg, #1e88e5, #42a5f5);
        padding: 30px 35px;
        border-bottom-left-radius: 24px;
        border-bottom-right-radius: 24px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        color: white;
        text-align: center;
    ">

        <h1 style="
            margin: 0;
            font-size: 32px;
            font-weight: 700;
        ">
            💬 Тут ваш чат
        </h1>

        <p style="
            margin-top: 10px;
            font-size: 16px;
            opacity: 0.95;
        ">
            Гарного спілкування з продавцем 🤝
        </p>

        <a href="/products" class="chat-header-btn">
            ⬅ На головну сторінку
        </a>

    </div>
</header>

</body>
</html>
