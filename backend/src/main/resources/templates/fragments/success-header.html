<!DOCTYPE html>
<html lang="uk"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Дякуємо за замовлення</title>
    <style>
        header.success-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        /* Чтобы контент не прилипал к хедеру */
        body {
            margin: 0;
            padding-top: 120px; /* высота хедера */
        }
    </style>
</head>

<body>

<header th:fragment="success-header" class="success-header">
    <div style="
        background: linear-gradient(135deg, #1e88e5, #42a5f5);
        padding: 30px 35px;
        border-bottom-left-radius: 24px;
        border-bottom-right-radius: 24px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        color: white;
        text-align: center;
    ">
        <h1 style="
            margin: 0;
            font-size: 32px;
            font-weight: 700;
        ">
            🎉 Дякуємо за оформлення товару!
        </h1>

        <p style="
            margin-top: 10px;
            font-size: 16px;
            opacity: 0.95;
        ">
           Пiзнiше Ваше замовлення успішно створено та передано продавцю
        </p>
    </div>
</header>

</body>
</html>
