<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header th:fragment="site-header">

    <div style="
        background: linear-gradient(135deg, #1e88e5, #42a5f5);
        padding: 25px 35px;
        border-bottom-left-radius: 24px;
        border-bottom-right-radius: 24px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        color: white;
    ">
        <div style="
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        ">

            <!-- ЛЕВАЯ ЧАСТЬ -->
            <div>
                <h1 style="margin: 0; font-size: 32px; font-weight: 700;">
                    ⚡ ЕлектроМаркет
                </h1>
                <p style="margin: 6px 0 0; font-size: 15px; opacity: 0.95;">
                    Купівля та продаж електроніки від користувачів
                </p>
                <p style="margin: 2px 0 0; font-size: 14px; opacity: 0.85;">
                    Тут ви можете продати свою стару електронну техніку<br>
                    або переглянути товари інших користувачів
                </p>
            </div>

            <!-- ПРАВАЯ ЧАСТЬ -->
            <nav style="display:flex; gap:12px; align-items:center; flex-wrap: wrap;">

                <!-- Welcome (только для логина) -->
                <div class="nav-btn"
                     sec:authorize="isAuthenticated()"
                     style="cursor: default;">
                    Ласкаво просимо,
                    <strong th:text="${user.username}">user</strong>!
                </div>

                <!-- Всегда -->
                <a href="/products" class="nav-btn">
                    Товари 📦
                </a>

                <!-- Корзина -->
                <a href="/cart"
                   sec:authorize="isAuthenticated()"
                   class="nav-btn">
                    🛒 Корзина
                    <span th:if="${cartSize > 0}">
                        (<span th:text="${cartSize}"></span> |
                         <span th:text="${cartTotal}"></span> грн)
                    </span>
                </a>

                <!-- АНОНИМ -->
                <a href="/login"
                   sec:authorize="isAnonymous()"
                   class="nav-btn white">
                    Вхід
                </a>

                <a href="/register"
                   sec:authorize="isAnonymous()"
                   class="nav-btn white">
                    Реєстрація
                </a>

                <!-- ВЫХОД -->
                <form th:action="@{/logout}"
                      method="post"
                      sec:authorize="isAuthenticated()"
                      style="margin:0;">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />
                    <button class="nav-btn white">
                        Вихід
                    </button>
                </form>

            </nav>
        </div>
    </div>

</header>

<style>
    .nav-btn {
        color: white;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 20px;
        background: rgba(255,255,255,0.15);
        font-weight: 500;
        border: none;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.25s ease;
    }

    .nav-btn:hover {
        background: rgba(255,255,255,0.25);
    }

    .nav-btn.white {
        background: white;
        color: #1e88e5;
        font-weight: 600;
    }

    .nav-btn.white:hover {
        background: #f2f2f2;
    }
</style>

</body>
</html>
