<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <title>Магазин електронiки</title>
  </head>

  <body>
    <header th:fragment="site-header">
      <link rel="stylesheet" th:href="@{/css/header.css}" />
      <div class="header-bg">
        <div class="header-bg-inside">
          <div class="header-left">
            <h1>⚡ ЕлектроМаркет</h1>
            <p class="header-subtitle">
              Купівля та продаж електроніки від користувачів
            </p>
            <p class="header-description">
              Тут ви можете продати свою стару електронну техніку
            </p>
          </div>

          <div class="nav-with-square">
            <div>
              <div
                class="nav-welcome"
                sec:authorize="isAuthenticated()"
                th:unless="${isProductsPage}"
              >
                Ласкаво просимо,
                <strong th:text="${user.username}">user</strong>!
              </div>
              <nav class="nav-capsule">
                <a
                  href="/user/home"
                  sec:authorize="isAuthenticated()"
                  class="nav-btn"
                >
                <!-- th:if="${isProductsPage}" -->
                  📦 Мої товари
                </a>

                <a href="/products" class="nav-btn nav-products">🏪 Магазин</a>

                <a
                  href="/cart"
                  sec:authorize="isAuthenticated()"
                  class="nav-btn cart-btn"
                >
                  <span class="cart-title">🛒 Корзина</span>
                </a>

                <a
                  href="/login"
                  sec:authorize="isAnonymous()"
                  class="nav-btn white"
                >
                  Вхід
                </a>

                <a
                  href="/register"
                  sec:authorize="isAnonymous()"
                  class="nav-btn white"
                >
                  Реєстрація
                </a>

                <form
                  th:action="@{/logout}"
                  method="post"
                  sec:authorize="isAuthenticated()"
                  style="margin: 0"
                >
                  <input
                    type="hidden"
                    th:name="${_csrf.parameterName}"
                    th:value="${_csrf.token}"
                  />
                  <button class="nav-btn white">Вихід</button>
                </form>
              </nav>
            </div>

            <a
              th:href="@{/cart}"
              th:if="${cartSize > 0}"
              class="cart-link"
              style="text-decoration: none; color: inherit"
            >
              <div class="designer-square">
                <span class="cart-info">
                  <span class="cart-count">
                    Товарів: <b th:text="${cartSize}"></b>
                  </span>
                  <span class="cart-total">
                    Сума: <b th:text="${cartTotal}"></b> грн
                  </span>
                </span>
              </div>
            </a>
          </div>
        </div>
                <div class="demo-warning">
          ⚠️ Demo mode: This is a portfolio project. No real transactions
        </div>
      </div>
    </header>
  </body>
</html>
