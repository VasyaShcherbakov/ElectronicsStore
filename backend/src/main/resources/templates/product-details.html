<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Детали товара</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* === RESET === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #d0e7ff;
        }

        main {
            min-height: calc(100vh - 160px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* === КАРТОЧКА === */
        .product-card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .product-image {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background-color: #f2f2f2;
        }

        .product-content {
            padding: 20px;
        }

        .product-title {
            text-align: center;
            margin-bottom: 15px;
        }

        .product-info {
            margin-bottom: 10px;
            font-size: 14px;
        }

        .product-info strong {
            display: inline-block;
            width: 160px;
        }

        /* === КНОПКА === */
        .btn-back {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #eeeeee;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        .btn-back:hover {
            background-color: #dddddd;
        }
    </style>
</head>

<body>

<div th:replace="fragments/product-details_header :: site-header"></div>

<main>

    <div class="product-card">

    <img th:if="${product.imageUrl != null and not #strings.isEmpty(product.imageUrl)}"
         th:src="@{'/uploads/' + ${product.imageUrl}}"
         alt="Изображение товара"
         class="product-image"/>

    <div class="product-content">
        <h2 class="product-title" th:text="${product.name}">
            Название товара
        </h2>

        <div class="product-info">
            <strong>Описание:</strong>
            <span th:text="${product.description}"></span>
        </div>

        <div class="product-info">
            <strong>Цена:</strong>
            <span th:text="${product.price}"></span> руб.
        </div>

        <div class="product-info">
            <strong>Количество:</strong>
            <span th:text="${product.quantity}"></span>
        </div>

        <button onclick="history.back()" class="btn-back">
            Назад
        </button>
    </div>

</div>
</body>
</html>
