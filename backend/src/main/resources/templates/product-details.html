<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Детали товара</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* === RESET === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #d0e7ff;
        }

        main {
            min-height: calc(100vh - 160px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* === CARD === */
        .product-card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .product-image {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background-color: #f2f2f2;
        }

        .product-content {
            padding: 20px;
        }

        .product-title {
            text-align: center;
            margin-bottom: 20px;
        }

        /* === ROWS === */
        .product-row {
            display: flex;
            align-items: flex-start;
            font-size: 14px;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .emoji {
            font-size: 1.2em;
            line-height: 1;
            display: inline-block;
            width: 1.6em;
            text-align: center;
            flex-shrink: 0;
        }

        /* === DESCRIPTION === */
        .product-description {
            display: flex;
            align-items: flex-start;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        /* === BUTTON === */
        .btn-back {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #eeeeee;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        .btn-back:hover {
            background-color: #dddddd;
        }
    </style>
</head>

<body>

<main>

    <div class="product-card">

        <img th:if="${product.imageUrl != null and not #strings.isEmpty(product.imageUrl)}"
             th:src="@{'/uploads/' + ${product.imageUrl}}"
             alt="Изображение товара"
             class="product-image"/>

        <div class="product-content">

            <h2 class="product-title">
                📦 <span th:text="${product.name}">Название товара</span>
            </h2>

            <div class="product-description">
                <span class="emoji">📝</span>
                <span th:text="${product.description}"></span>
            </div>

            <div class="product-row">
                <span class="emoji">💰</span>
                <span>Цiна: <strong th:text="${product.price}"></strong> грн</span>
            </div>

            <div class="product-row">
                <span class="emoji">📥</span>
                <span>Кiлькiсть в продавця:
                    <strong th:text="${product.quantity}"></strong>
                </span>
            </div>

            <button onclick="history.back()" class="btn-back">
                Назад
            </button>

        </div>
    </div>

</main>

</body>
</html>
