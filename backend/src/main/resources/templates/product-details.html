<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Детали товара</title>
</head>
<body class="container mt-4" style="background-color:#d0e7ff;">

<h1 th:text="${product.name}">Название товара</h1>

<div class="card mb-4" style="width: 18rem;">
    <img th:if="${product.imageUrl != null and not #strings.isEmpty(product.imageUrl)}"
         th:src="@{'/uploads/' + ${product.imageUrl}}"
         class="card-img-top" alt="Изображение товара" style="height: 250px; object-fit: cover;">
    <div class="card-body">
        <h5 class="card-title" th:text="${product.name}">Название товара</h5>
        <p class="card-text"><strong>Описание:</strong> <span th:text="${product.description}"></span></p>
        <p class="card-text"><strong>Цена:</strong> <span th:text="${product.price}"></span> руб.</p>
        <p class="card-text"><strong>Количество на складе:</strong> <span th:text="${product.quantity}"></span></p>
    </div>
</div>

<button onclick="history.back()" class="btn btn-secondary">Назад</button>

</body>
</html>
