<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title} ?: 'Ошибка'">Ошибка</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #d0e7ff, #f5faff);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-card {
            background: white;
            max-width: 500px;
            width: 90%;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .error-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #42a5f5, #1e88e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-message {
            font-size: 16px;
            color: #444;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .error-code {
            font-size: 13px;
            color: #888;
            margin-bottom: 25px;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 22px;
            border-radius: 8px;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            font-size: 15px;
            transition: background-color 0.2s ease;
        }

        .back-btn:hover {
            background-color: #357abd;
        }
    </style>
</head>

<body>

<div class="error-card">

    <div class="error-icon">⚠️</div>

    <h1 class="error-title"
        th:text="${title} ?: 'Произошла ошибка'">
        Произошла ошибка
    </h1>

    <p class="error-message"
       th:text="${message} ?: 'Что-то пошло не так. Попробуйте ещё раз.'">
        Детали ошибки
    </p>

    <div class="error-code" th:if="${code != null}">
        Код ошибки: <span th:text="${code}"></span>
    </div>

    <a th:href="${backUrl} ?: '/'" class="back-btn">
        ⬅ Вернуться назад
    </a>

</div>

</body>
</html>
