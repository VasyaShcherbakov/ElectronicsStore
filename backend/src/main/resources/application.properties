spring.application.name=OnlineElectronicsStore

# ==========================
# SERVER (PORT FIX ?)
# ==========================
server.port=${PORT:8080}

# ==========================
# DATABASE CONFIGURATION
# ==========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/online_electronics_store_v2}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dev_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================
# JWT CONFIGURATION
# ==========================
jwt.secret=${JWT_SECRET:dev-secret-key}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ==========================
# JPA / HIBERNATE
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.generate-ddl=true

# ==========================
# LOGGING
# ==========================
logging.level.org.springframework.security=DEBUG
logging.level.root=ERROR
logging.level.org.springframework=DEBUG

# ==========================
# FILE UPLOAD
# ==========================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB