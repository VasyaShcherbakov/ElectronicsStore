<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Главная страница</title>
</head>
<body class="container mt-4" style="background-color:#d0e7ff;">
<h2>Добро пожаловать, <span th:text="${user.username}"></span>!</h2>

<nav class="mb-4">
    <a href="/cart" class="btn btn-primary">Перейти в корзину (<span th:text="${cartSize}"></span>)</a>
    <form th:action="@{/logout}" method="post" class="m-0">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="btn btn-outline-danger">Выход</button>
    </form>
</nav>

<h3>Список товаров</h3>

<form action="/user/home" method="get" class="mb-4">
    <div class="input-group w-50">
        <input type="text" name="query" class="form-control" placeholder="Поиск товаров" th:value="${query}">
        <button type="submit" class="btn btn-info">Поиск</button>
    </div>
</form>

<div class="row">
    <div class="col-md-4 mb-4" th:each="product : ${products}">
        <div class="card h-100">
            <img th:if="${product.imageUrl != null and not #strings.isEmpty(product.imageUrl)}"
                 th:src="@{'/uploads/' + ${product.imageUrl}}"
                 class="card-img-top" alt="Изображение товара" style="height: 250px; object-fit: cover;">
            <div class="card-body">
                <h5 class="card-title" th:text="${product.name}">Название товара</h5>
                <p class="card-text" th:text="${product.description}">Описание товара</p>
                <p class="card-text"><strong>Цена:</strong> <span th:text="${product.price}">0.00</span> руб.</p>
                <p class="card-text"><strong>На складе:</strong> <span th:text="${product.quantity}">0</span></p>
            </div>
            <div class="card-footer d-flex justify-content-between">
                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                    <button type="submit" class="btn btn-success btn-sm">Добавить в корзину</button>
                </form>
                <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-sm">Детали</a>
            </div>
        </div>
    </div>
</div>

<h3 class="mt-5">Добавить товар</h3>
<form th:action="@{/user/home/add}" th:object="${product}" method="post" enctype="multipart/form-data" class="mt-3">
    <div class="mb-3">
        <input type="file" name="imageFile" class="form-control" />
    </div>
    <div class="mb-3">
        <input type="text" th:field="*{name}" class="form-control" placeholder="Название" />
    </div>
    <div class="mb-3">
        <input type="text" th:field="*{description}" class="form-control" placeholder="Описание" />
    </div>
    <div class="mb-3">
        <input type="number" th:field="*{price}" class="form-control" placeholder="Цена" />
    </div>
    <div class="mb-3">
        <input type="number" th:field="*{quantity}" class="form-control" placeholder="Количество" />
    </div>
    <button type="submit" class="btn btn-primary">Добавить</button>
</form>

</body>
</html>
