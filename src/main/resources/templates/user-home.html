<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Главная страница</title>
</head>
<body class="container mt-4">
<h2>Добро пожаловать, <span th:text="${user_role}"></span>!</h2>

<nav class="mb-4">
    <a href="/cart" class="btn btn-primary">Перейти в корзину</a>
    <a href="/logout" class="btn btn-danger">Выйти</a>
</nav>



<a href="/cart" class="btn btn-primary">
    Корзина (<span th:text="${cartSize}"></span>)
</a>


<h3>Список товаров</h3>

<form action="/user/home" method="get" class="mb-3">
    <input type="text" name="query" class="form-control w-25 d-inline" placeholder="Поиск товаров" th:value="${query}">
    <button type="submit" class="btn btn-info">Поиск</button>
</form>


<table class="table table-striped">
    <thead>
    <tr>
        <th>Название</th>
        <th>Описание</th>
        <th>Цена</th>
        <th>Количество</th>
        <th>Изображение</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${products}">
        <td th:text="${product.name}"></td>
        <td th:text="${product.description}"></td>
        <td th:text="${product.price}"></td>
        <td th:text="${product.quantity}"></td>
        <td>
            <img th:if="${product.imageUrl != null and not #strings.isEmpty(product.imageUrl)}"
                 th:src="${product.imageUrl}" alt="Изображение"
                 style="max-width: 100px; height: auto;">
        </td>

        <td>
            <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-success btn-sm">Добавить в корзину</button>
            </form>
            <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-sm">Детали</a>
        </td>
    </tr>
    </tbody>
</table>
<h3>Добавить товар</h3>
<form action="/products/add" method="post">
    <input type="text" name="name" class="form-control w-25" placeholder="Название" required><br>
    <input type="text" name="description" class="form-control w-50" placeholder="Описание" required><br>
    <input type="number" name="price" class="form-control w-25" placeholder="Цена" required><br>
    <input type="number" name="quantity" class="form-control w-25" placeholder="Количество" required><br>
    <input type="text" name="imageUrl" class="form-control w-50" placeholder="Ссылка на изображение"><br>
    <button type="submit" class="btn btn-success">Добавить</button>
</form>


</body>
</html>
