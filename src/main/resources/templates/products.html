<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Список товаров</title>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-end mb-3 align-items-center">
        <!-- Если пользователь НЕ авторизован -->
        <a th:href="@{/login}" class="btn btn-outline-primary me-2" sec:authorize="isAnonymous()">Вход</a>
        <a th:href="@{/register}" class="btn btn-outline-success me-2" sec:authorize="isAnonymous()">Регистрация</a>

        <!-- Если пользователь авторизован -->
        <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">
            <span class="me-2">Привет, <span sec:authentication="name"></span>!</span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-outline-danger">Выход</button>
            </form>
        </div>
    </div>





    <h1>Список товаров</h1>




    <!-- Форма поиска -->
    <form action="/products/search" method="get" class="mb-3">
        <input type="text" name="query" placeholder="Поиск товаров" th:value="${query}" class="form-control w-50 d-inline">
        <button type="submit" class="btn btn-primary">Поиск</button>
    </form>

  <!--  List of products-->

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Название</th>
            <th>Описание</th>
            <th>Цена</th>
            <th>Количество</th>
            <th>Изображение</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.name}"></td>
            <td th:text="${product.description}"></td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.quantity}"></td>
            <td>
                <img th:if="${product.imageUrl != null and not #strings.isEmpty(product.imageUrl)}"
                     th:src="${product.imageUrl}" alt="Изображение"
                     style="max-width: 100px; height: auto;">
            </td>
            <td>
                <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-sm">Детали</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
