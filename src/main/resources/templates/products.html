<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Список товаров</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <!-- Хедер -->
    <div class="d-flex justify-content-end mb-3 align-items-center">
        <a th:href="@{/login}" class="btn btn-outline-primary me-2" sec:authorize="isAnonymous()">Вход</a>
        <a th:href="@{/register}" class="btn btn-outline-success me-2" sec:authorize="isAnonymous()">Регистрация</a>
        <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">
            <span class="me-2">Привет, <span sec:authentication="name"></span>!</span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-outline-danger">Выход</button>
            </form>
        </div>
    </div>

    <h1 class="mb-3">Список товаров</h1>

    <!-- Поиск -->
    <form action="/products/search" method="get" class="mb-4">
        <div class="input-group w-50">
            <input type="text" name="query" placeholder="Поиск товаров"
                   th:value="${query}" class="form-control">
            <button type="submit" class="btn btn-primary">Поиск</button>
        </div>
    </form>

    <!-- Таблица товаров -->
    <table class="table table-hover align-middle">
        <thead class="table-light">
        <tr>
            <th>Название</th>
            <th>Описание</th>
            <th>Цена</th>
            <th>Количество</th>
            <th>Изображение</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.name}"></td>
            <td th:text="${product.description}"></td>
            <td th:text="${product.price} + ' ₽'"></td>
            <td th:text="${product.quantity}"></td>
            <td>
                <div class="card" style="width: 8rem;">
                    <img th:if="${product.imageUrl != null and not #strings.isEmpty(product.imageUrl)}"
                         th:src="@{'/uploads/' + ${product.imageUrl}}"
                         class="card-img-top"
                         alt="Изображение товара"
                         style="max-width: 150px; max-height: 150px; object-fit: contain;">

                </div>
            </td>
            <td class="text-center">
                <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-sm mb-1">Детали</a>
                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-success btn-sm">Купить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
